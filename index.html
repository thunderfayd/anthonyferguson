<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Future &mdash; Anthony Ferguson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --white: #FAFAF8;
    --white-dim: rgba(250, 250, 248, 0.6);
    --gold: #C9A84C;
    --dark: #0A0A0A;
    --border: rgba(201, 168, 76, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

body {
    background: var(--dark);
    font-family: 'Outfit', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* --- CURSOR --- */
.cursor-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.1s; transform: translate(-50%, -50%); }
.cursor-outline { width: 34px; height: 34px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1); transform: translate(-50%, -50%); opacity: 0.3; }

/* --- INTRO ANIMATION --- */
.intro-wrap { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; justify-content: center; align-items: center; }

/* The single continuous line */
.vertical-axis {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 0%;
    background: var(--gold);
    transform: translateX(-50%);
    z-index: 105;
    animation: lineFullGrow 1s 0.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}

@keyframes lineFullGrow { to { height: 100%; } }

.intro-panel { position: absolute; top: 0; width: 50%; height: 100%; background: var(--dark); transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1); z-index: 100; }
.intro-panel-left { left: 0; }
.intro-panel-right { right: 0; }

.intro-wrap.revealed .intro-panel-left { transform: translateX(-100%); }
.intro-wrap.revealed .intro-panel-right { transform: translateX(100%); }
.intro-wrap.revealed .vertical-axis { opacity: 0; transition: opacity 0.5s; }

.intro-monogram { 
    font-family: 'Cormorant Garamond', serif; 
    font-size: 72px; 
    font-weight: 300; 
    color: var(--gold); 
    letter-spacing: 12px; 
    position: relative; 
    z-index: 110;
    opacity: 0;
    /* This shadow creates a "gap" in perception without actually cutting the line */
    text-shadow: 0 0 15px var(--dark), 0 0 10px var(--dark);
    animation: monogramAppear 1.2s 0.6s ease-out forwards;
}

@keyframes monogramAppear { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

/* --- CONTENT --- */
.container { width: 100%; max-width: 440px; position: relative; z-index: 10; opacity: 0; transform: translateY(30px); transition: 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
.container.active { opacity: 1; transform: translateY(0); }

.header { text-align: center; margin-bottom: 60px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; line-height: 1.1; margin-bottom: 12px; }
.gold-text { background: linear-gradient(to right, #fff 20%, var(--gold) 40%, var(--gold) 60%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
@keyframes shine { to { background-position: 200% center; } }

.section { margin-bottom: 40px; opacity: 0; transform: translateY(20px); transition: 0.8s ease; }
.section.reveal { opacity: 1; transform: translateY(0); }
.section-label { font-size: 10px; font-weight: 500; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; display: block; }

.card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: 0.4s; backdrop-filter: blur(20px); }
.card-header { padding: 22px 26px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.card-title { font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 300; color: var(--white); }
.card-icon { color: var(--gold); transition: 0.4s; font-size: 18px; opacity: 0.6; }
.card.open .card-icon { transform: rotate(45deg); opacity: 1; }
.card-body { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.card.open .card-body { max-height: 500px; }
.card-content { padding: 0 26px 26px; border-top: 1px solid rgba(201,168,76,0.08); font-size: 13.5px; line-height: 1.8; color: var(--white-dim); }

.link-card { display: flex; justify-content: space-between; align-items: center; padding: 20px 26px; border: 1px solid var(--border); text-decoration: none; color: var(--white); margin-bottom: 12px; transition: 0.4s; background: rgba(255, 255, 255, 0.02); }
.link-card:hover { border-color: var(--white); background: rgba(201, 168, 76, 0.08); }

@media(max-width: 480px) {
    * { cursor: auto; }
    .cursor-dot, .cursor-outline { display: none; }
}
</style>
</head>
<body>

<div class="cursor-dot" id="dot"></div>
<div class="cursor-outline" id="outline"></div>

<div class="intro-wrap" id="introWrap">
    <div class="vertical-axis"></div>
    <div class="intro-panel intro-panel-left"></div>
    <div class="intro-panel intro-panel-right"></div>
    <div class="intro-monogram">AF</div>
</div>

<div class="container" id="mainContainer">
    <header class="header">
        <h1 class="gold-text">Anthony<br>Ferguson</h1>
        <p style="font-size: 11px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.7;">Developer &middot; Creative</p>
    </header>

    <div class="section">
        <span class="section-label">Services</span>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Development</span>
                <span class="card-icon">+</span>
            </div>
            <div class="card-body">
                <div class="card-content">
                    Custom web solutions, business automation, and creative design.
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="section-label">Connect</span>
        <a class="link-card" href="https://www.instagram.com/af.mp3/" target="_blank">
            <span style="font-size:13px; letter-spacing:2px; text-transform:uppercase">Instagram</span>
            <span style="color:var(--gold)">&rarr;</span>
        </a>
        <a class="link-card" id="emailLink" href="#">
            <span style="font-size:13px; letter-spacing:2px; text-transform:uppercase">Email</span>
            <span style="color:var(--gold)">&rarr;</span>
        </a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const u = 'ant5ferg', d = 'gmail.com';
    document.getElementById('emailLink').href = 'mai' + 'lto:' + u + '@' + d;

    const intro = document.getElementById('introWrap');
    const container = document.getElementById('mainContainer');
    const sections = document.querySelectorAll('.section');

    // AUTO TRIGGER
    setTimeout(() => {
        intro.classList.add('revealed');
        container.classList.add('active');
        sections.forEach((s, i) => {
            setTimeout(() => s.classList.add('reveal'), 400 + (i * 150));
        });
    }, 2500);

    // CURSOR
    const dot = document.getElementById('dot');
    const outline = document.getElementById('outline');
    document.addEventListener('mousemove', (e) => {
        dot.style.left = `${e.clientX}px`; dot.style.top = `${e.clientY}px`;
        outline.style.left = `${e.clientX}px`; outline.style.top = `${e.clientY}px`;
    });

    // ACCORDION
    document.querySelectorAll('.card-header').forEach(header => {
        header.addEventListener('click', () => {
            header.parentElement.classList.toggle('open');
        });
    });
});
</script>

</body>
</html>
